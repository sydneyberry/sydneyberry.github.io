<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>WHIMSY BINGOOOOO</title>

    <!-- IMPORTANT for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script defer src="script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="min-h-screen bg-purple-200 flex items-center justify-center p-4">
    <div class="flex flex-col items-center gap-4 w-full max-w-md">

      <h1 class="text-xl md:text-2xl font-bold text-center">
        SUMMER OF WHIMSY BINGO
      </h1>

      <!-- Custom phrases -->
      <textarea
        id="customPhrases"
        placeholder="Optional: one phrase per line..."
        class="w-full h-40 px-4 py-2 rounded-lg border border-purple-300 focus:outline-none focus:ring-2 focus:ring-purple-500"
      ></textarea>

      <!-- Count -->
      <input
        type="number"
        id="count"
        value="1"
        min="1"
        max="50"
        class="w-full px-4 py-2 rounded-lg border border-purple-300 focus:outline-none focus:ring-2 focus:ring-purple-500 text-center"
      />

      <button
        onclick="generate()"
        class="w-full bg-purple-600 text-white px-6 py-3 rounded-xl shadow-md hover:bg-purple-700 transition"
      >
        Generate
      </button>
    </div>
  </body>
</html>
